<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mind Palace</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { overflow:hidden; background:#000510; }
    canvas { display:block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── RENDERER ─────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ─── SCENE ────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000308);
scene.fog = new THREE.FogExp2(0x00091a, 0.020);

// ─── CAMERA ───────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 300);
camera.position.set(0, 1.8, 5);

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const rand  = (a, b) => a + Math.random() * (b - a);
const pick  = arr => arr[Math.floor(Math.random() * arr.length)];
const flatMat = color => new THREE.MeshPhongMaterial({ color, flatShading: true });

// ─── PALETTE ──────────────────────────────────────────────────────────────────
const P = {
  groundDark:  0x030a14,
  groundMid:   0x060f1e,
  groundLight: 0x0a1830,
  trunkA:      0x030710,
  trunkB:      0x050b16,
  foliageA:    0x040c18,
  foliageB:    0x061220,
  foliageC:    0x030a14,
  pathA:       0x070f1a,
  rockDark:    0x070c16,
  rockMid:     0x0a1424,
  cyan:        0x00e5ff,
  purple:      0x7733cc,
  flowerA:     0x4422aa,
  flowerB:     0x6633cc,
  flowerC:     0x553399,
  star:        0x6688bb,
};

// ─── GLOW TEXTURES (canvas radial gradients → bloom sprites) ──────────────────
function makeGlowTex(r, g, b) {
  const c = document.createElement('canvas');
  c.width = c.height = 128;
  const ctx = c.getContext('2d');
  const grd = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
  grd.addColorStop(0,    `rgba(${r},${g},${b},1.0)`);
  grd.addColorStop(0.25, `rgba(${r},${g},${b},0.6)`);
  grd.addColorStop(0.55, `rgba(${r},${g},${b},0.15)`);
  grd.addColorStop(1,    'rgba(0,0,0,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(c);
}
const glowCyan   = makeGlowTex(0,   229, 255);
const glowPurple = makeGlowTex(140,  60, 240);
const glowMoon   = makeGlowTex(180, 210, 255);
const glowWarm   = makeGlowTex(80,  160, 255);

function makeSprite(tex, size, opacity = 0.7) {
  const mat  = new THREE.SpriteMaterial({
    map: tex, blending: THREE.AdditiveBlending,
    transparent: true, opacity, depthWrite: false,
  });
  const s = new THREE.Sprite(mat);
  s.scale.set(size, size, 1);
  return { sprite: s, mat };
}

// ─── LIGHTING ─────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x04091a, 1.5));

// Moonlight — cold, top-left
const moon = new THREE.DirectionalLight(0x1a3a6a, 1.0);
moon.position.set(-12, 28, 0);
moon.castShadow = true;
moon.shadow.mapSize.set(2048, 2048);
moon.shadow.camera.left = -70; moon.shadow.camera.right = 70;
moon.shadow.camera.top  =  70; moon.shadow.camera.bottom = -70;
moon.shadow.camera.far  = 200;
scene.add(moon);

// Subtle purple fill from right
const fillLight = new THREE.DirectionalLight(0x110022, 0.4);
fillLight.position.set(15, 5, -20);
scene.add(fillLight);

// Glow lights array — holds path + rock lights for animation
const glowLights = [];
for (let i = 0; i < 14; i++) {
  const l = new THREE.PointLight(P.cyan, 0.18, 9);
  l.position.set(0, 0.35, -i * 8 + 4);
  scene.add(l);
  glowLights.push({ l, phase: rand(0, Math.PI * 2) });
}

// ─── SKY DOME ─────────────────────────────────────────────────────────────────
const skyMat = new THREE.MeshBasicMaterial({ color: 0x000308, side: THREE.BackSide });
scene.add(new THREE.Mesh(new THREE.SphereGeometry(260, 8, 6), skyMat));

// ─── MOON (disc + large glow halo) ───────────────────────────────────────────
const moonPos = new THREE.Vector3(-22, 32, -95);

// Crisp disc
const moonDiscGeo = new THREE.CircleGeometry(1.6, 14);
const moonDiscMat = new THREE.MeshBasicMaterial({ color: 0xc8deff });
const moonDisc    = new THREE.Mesh(moonDiscGeo, moonDiscMat);
moonDisc.position.copy(moonPos);
moonDisc.position.z += 0.1;
scene.add(moonDisc);

// Large diffuse halo
const { sprite: moonHalo, mat: moonHaloMat } = makeSprite(glowMoon, 28, 0.55);
moonHalo.position.copy(moonPos);
scene.add(moonHalo);

// Smaller bright inner glow
const { sprite: moonInner, mat: moonInnerMat } = makeSprite(glowMoon, 9, 0.8);
moonInner.position.copy(moonPos);
scene.add(moonInner);

// ─── AURORA ───────────────────────────────────────────────────────────────────
const auroraData = [];
const aurColors  = [0x00ffcc, 0x0033cc, 0x00aaff, 0x440088, 0x00ff99, 0x2200aa];
for (let i = 0; i < 8; i++) {
  const w = rand(100, 220), h = rand(16, 34);
  const geo = new THREE.PlaneGeometry(w, h, 7, 4);
  const pos = geo.attributes.position;
  for (let j = 0; j < pos.count; j++) {
    pos.setY(j, pos.getY(j) + (Math.random() - 0.5) * 7);
    pos.setX(j, pos.getX(j) + (Math.random() - 0.5) * 5);
  }
  pos.needsUpdate = true; geo.computeVertexNormals();
  const mat = new THREE.MeshBasicMaterial({
    color: aurColors[i % aurColors.length], transparent: true,
    opacity: rand(0.018, 0.045), side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(rand(-15, 15), rand(16, 30), rand(-65, -130));
  m.rotation.x = rand(-0.1, 0.08);
  scene.add(m);
  auroraData.push({ m, mat, phase: rand(0, Math.PI * 2), speed: rand(0.12, 0.35) });
}

// ─── STARS ────────────────────────────────────────────────────────────────────
const STARS = 900;
const sBuf  = new Float32Array(STARS * 3);
for (let i = 0; i < STARS; i++) {
  sBuf[i*3] = rand(-130, 130); sBuf[i*3+1] = rand(8, 60); sBuf[i*3+2] = rand(-15, -240);
}
const sGeo = new THREE.BufferGeometry();
sGeo.setAttribute('position', new THREE.BufferAttribute(sBuf, 3));
scene.add(new THREE.Points(sGeo, new THREE.PointsMaterial({
  color: P.star, size: 0.07, transparent: true, opacity: 0.75,
  sizeAttenuation: true, depthWrite: false,
})));

// ─── GOD RAYS ─────────────────────────────────────────────────────────────────
// Vertical translucent planes — shaft of moonlight filtering through trees
const godRayData = [];
const rayPositions = [
  [-3, -25], [4, -38], [-2, -55], [3, -70], [-4, -90], [2, -108],
];
rayPositions.forEach(([rx, rz]) => {
  const h = rand(9, 16), w = rand(0.6, 1.4);
  const geo = new THREE.PlaneGeometry(w, h, 2, 4);
  const mat = new THREE.MeshBasicMaterial({
    color: 0x1a4a88, transparent: true,
    opacity: rand(0.05, 0.12), side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(rx + rand(-1, 1), h / 2 + 0.5, rz);
  m.rotation.y = rand(-0.2, 0.2);
  scene.add(m);
  godRayData.push({ m, mat, phase: rand(0, Math.PI * 2) });
});

// ─── GROUND ───────────────────────────────────────────────────────────────────
const groundGeo = new THREE.PlaneGeometry(110, 250, 16, 36);
const gp = groundGeo.attributes.position;
for (let i = 0; i < gp.count; i++) {
  if (Math.abs(gp.getX(i)) > 4) gp.setZ(i, rand(0, 0.6));
}
gp.needsUpdate = true; groundGeo.computeVertexNormals();

const gc = new Float32Array(gp.count * 3);
const cA = new THREE.Color(P.groundDark), cB = new THREE.Color(P.groundMid), cC = new THREE.Color(P.groundLight);
for (let i = 0; i < gp.count; i++) {
  const t = Math.random();
  const c = t < 0.5 ? cA.clone().lerp(cB, t * 2) : cB.clone().lerp(cC, (t - 0.5) * 2);
  gc[i*3] = c.r; gc[i*3+1] = c.g; gc[i*3+2] = c.b;
}
groundGeo.setAttribute('color', new THREE.BufferAttribute(gc, 3));
const groundMesh = new THREE.Mesh(groundGeo,
  new THREE.MeshPhongMaterial({ vertexColors: true, flatShading: true }));
groundMesh.rotation.x = -Math.PI / 2;
groundMesh.position.z = -78;
groundMesh.receiveShadow = true;
scene.add(groundMesh);

// ─── PATH ─────────────────────────────────────────────────────────────────────
const pathGeo = new THREE.PlaneGeometry(3.2, 250, 4, 52);
const pp = pathGeo.attributes.position;
for (let i = 0; i < pp.count; i++) {
  const x = pp.getX(i);
  if (Math.abs(x) > 1.2) pp.setX(i, x + (Math.random() - 0.5) * 0.28);
}
pp.needsUpdate = true; pathGeo.computeVertexNormals();
const pathMesh = new THREE.Mesh(pathGeo, flatMat(P.pathA));
pathMesh.rotation.x = -Math.PI / 2;
pathMesh.position.set(0, 0.013, -78);
pathMesh.receiveShadow = true;
scene.add(pathMesh);

// Faint path edge glow strips
[-1.62, 1.62].forEach(ex => {
  const eGeo = new THREE.PlaneGeometry(0.12, 250);
  const eMat = new THREE.MeshBasicMaterial({
    color: P.cyan, transparent: true, opacity: 0.08,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const e = new THREE.Mesh(eGeo, eMat);
  e.rotation.x = -Math.PI / 2;
  e.position.set(ex, 0.02, -78);
  scene.add(e);
});

// ─── PURPLE FLOWERS ───────────────────────────────────────────────────────────
const flowerPalette = [P.flowerA, P.flowerB, P.flowerC];
function addFlowers(cx, cz) {
  const count = 5 + Math.floor(Math.random() * 7);
  for (let i = 0; i < count; i++) {
    const s   = rand(0.035, 0.1);
    const geo = new THREE.IcosahedronGeometry(s, 0);
    const rp  = geo.attributes.position;
    for (let j = 0; j < rp.count; j++) rp.setY(j, rp.getY(j) * rand(0.6, 1.8));
    rp.needsUpdate = true; geo.computeVertexNormals();
    const mat = new THREE.MeshPhongMaterial({
      color: pick(flowerPalette), emissive: 0x1a0033, flatShading: true,
    });
    const m = new THREE.Mesh(geo, mat);
    m.position.set(cx + rand(-1.5, 1.5), s * 0.6, cz + rand(-1.5, 1.5));
    m.rotation.set(rand(0, Math.PI), rand(0, Math.PI), rand(0, Math.PI));
    scene.add(m);
  }
  // Small purple glow sprite above flower cluster
  const { sprite: flSprite, mat: flMat } = makeSprite(glowPurple, rand(1.8, 3.5), rand(0.25, 0.45));
  flSprite.position.set(cx, rand(0.1, 0.5), cz);
  scene.add(flSprite);
}

// ─── GLOWING ROCK CLUSTERS (future idea nodes) ────────────────────────────────
const rockSprites = []; // for animation
function makeRockCluster(cx, cz) {
  const count = 2 + Math.floor(Math.random() * 4);
  for (let i = 0; i < count; i++) {
    const s  = rand(0.12, 0.5);
    const geo = new THREE.IcosahedronGeometry(s, 0);
    const rp  = geo.attributes.position;
    for (let j = 0; j < rp.count; j++) {
      rp.setX(j, rp.getX(j) * rand(0.65, 1.35));
      rp.setY(j, rp.getY(j) * rand(0.5,  1.1));
      rp.setZ(j, rp.getZ(j) * rand(0.65, 1.35));
    }
    rp.needsUpdate = true; geo.computeVertexNormals();
    const bright = Math.random() > 0.5;
    const rock = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({
      color:    bright ? 0x0e2a3e : P.rockMid,
      emissive: bright ? 0x002233 : 0x000000,
      flatShading: true,
    }));
    rock.position.set(cx + rand(-0.7, 0.7), s * 0.52, cz + rand(-0.7, 0.7));
    rock.rotation.set(rand(0, Math.PI), rand(0, Math.PI), rand(0, Math.PI));
    rock.castShadow = true;
    scene.add(rock);
  }

  // Point light inside cluster
  const l = new THREE.PointLight(P.cyan, rand(0.5, 1.1), rand(5, 9));
  l.position.set(cx, 0.3, cz);
  scene.add(l);
  glowLights.push({ l, phase: rand(0, Math.PI * 2), isRock: true });

  // Large soft glow halo (bloom effect)
  const { sprite: bigHalo, mat: bigMat } = makeSprite(glowCyan, rand(4.5, 7.0), rand(0.4, 0.65));
  bigHalo.position.set(cx, 0.5, cz);
  scene.add(bigHalo);
  rockSprites.push({ mat: bigMat, phase: rand(0, Math.PI * 2) });

  // Small bright inner core
  const { sprite: coreHalo, mat: coreMat } = makeSprite(glowCyan, rand(1.2, 2.2), rand(0.7, 0.95));
  coreHalo.position.set(cx, 0.35, cz);
  scene.add(coreHalo);
  rockSprites.push({ mat: coreMat, phase: rand(0, Math.PI * 2) + 1 });

  // Purple flowers around rock
  addFlowers(cx, cz);
}

const rockSpots = [
  [-4.5,  -7],  [ 5.2, -14], [-6.0, -23],
  [ 4.8, -31],  [-5.5, -41], [ 6.2, -53],
  [-4.2, -63],  [ 5.8, -76], [-7.0, -89],
  [ 4.5, -99],  [-5.0,-110],
];
rockSpots.forEach(([x, z]) => makeRockCluster(x + rand(-0.5, 0.5), z));

// ─── BARE SKELETAL TREES ──────────────────────────────────────────────────────
const up3 = new THREE.Vector3(0, 1, 0);

function createBareTree(x, z, scale) {
  const group   = new THREE.Group();
  const trunkH  = rand(4.0, 7.0) * scale;
  const trunkGeo = new THREE.CylinderGeometry(0.04 * scale, 0.14 * scale, trunkH, 5, 2);
  const tp = trunkGeo.attributes.position;
  for (let i = 0; i < tp.count; i++) tp.setX(i, tp.getX(i) + (Math.random() - 0.5) * 0.05 * scale);
  tp.needsUpdate = true; trunkGeo.computeVertexNormals();
  const trunk = new THREE.Mesh(trunkGeo, flatMat(pick([P.trunkA, P.trunkB])));
  trunk.position.y = trunkH / 2;
  trunk.castShadow = true;
  group.add(trunk);

  // Branches — use quaternion rotation to align Y axis with desired direction
  const bCount = 3 + Math.floor(Math.random() * 4);
  for (let i = 0; i < bCount; i++) {
    const bLen    = rand(0.7, 2.2) * scale;
    const outAng  = rand(0.4, 1.0);   // tilt from vertical
    const dirY    = rand(0, Math.PI * 2); // horizontal direction

    const dir = new THREE.Vector3(
      Math.sin(outAng) * Math.sin(dirY),
      Math.cos(outAng),
      Math.sin(outAng) * Math.cos(dirY)
    ).normalize();

    const bGeo = new THREE.CylinderGeometry(0.008 * scale, 0.038 * scale, bLen, 4, 1);
    const branch = new THREE.Mesh(bGeo, flatMat(pick([P.trunkA, P.trunkB])));

    // Align cylinder (default Y-up) to dir
    const quat = new THREE.Quaternion().setFromUnitVectors(up3, dir);
    branch.quaternion.copy(quat);

    const h = rand(0.32, 0.90) * trunkH;
    branch.position.set(dir.x * bLen / 2, h + dir.y * bLen / 2, dir.z * bLen / 2);
    branch.castShadow = true;
    group.add(branch);

    // Sub-branch
    if (Math.random() > 0.55) {
      const sbLen    = bLen * rand(0.3, 0.55);
      const sbOutAng = rand(0.4, 0.9);
      const sbDirY   = rand(0, Math.PI * 2);
      const sbDir = new THREE.Vector3(
        Math.sin(sbOutAng) * Math.sin(sbDirY),
        Math.cos(sbOutAng),
        Math.sin(sbOutAng) * Math.cos(sbDirY)
      ).normalize();
      const sbGeo  = new THREE.CylinderGeometry(0.004 * scale, 0.018 * scale, sbLen, 4, 1);
      const subb   = new THREE.Mesh(sbGeo, flatMat(P.trunkA));
      const sbQuat = new THREE.Quaternion().setFromUnitVectors(up3, sbDir);
      subb.quaternion.copy(sbQuat);
      // Position relative to branch end
      subb.position.set(
        dir.x * bLen / 2 + sbDir.x * sbLen / 2,
        h + dir.y * bLen / 2 + sbDir.y * sbLen / 2,
        dir.z * bLen / 2 + sbDir.z * sbLen / 2
      );
      group.add(subb);
    }
  }
  group.position.set(x, 0, z);
  group.rotation.y = rand(0, Math.PI * 2);
  scene.add(group);
}

// ─── PINE TREES ───────────────────────────────────────────────────────────────
const foliagePalette = [P.foliageA, P.foliageB, P.foliageC];
const trunkPalette   = [P.trunkA, P.trunkB];

function createPineTree(x, z, scale) {
  const group  = new THREE.Group();
  const trunkH = rand(2.8, 4.5) * scale;
  const tGeo   = new THREE.CylinderGeometry(0.06 * scale, 0.2 * scale, trunkH, 5, 2);
  const tp     = tGeo.attributes.position;
  for (let i = 0; i < tp.count; i++) tp.setX(i, tp.getX(i) + (Math.random() - 0.5) * 0.06 * scale);
  tp.needsUpdate = true; tGeo.computeVertexNormals();
  const trunk = new THREE.Mesh(tGeo, flatMat(pick(trunkPalette)));
  trunk.position.y = trunkH / 2; trunk.castShadow = true;
  group.add(trunk);

  const layers = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < layers; i++) {
    const t   = i / (layers - 1 || 1);
    const r   = (0.78 - t * 0.28) * scale;
    const h   = (1.65 - t * 0.18) * scale;
    const cGeo = new THREE.ConeGeometry(r, h, 5 + Math.floor(Math.random() * 2), 1);
    const cp   = cGeo.attributes.position;
    for (let j = 0; j < cp.count; j++) {
      cp.setX(j, cp.getX(j) + (Math.random() - 0.5) * 0.08 * scale);
      cp.setZ(j, cp.getZ(j) + (Math.random() - 0.5) * 0.08 * scale);
    }
    cp.needsUpdate = true; cGeo.computeVertexNormals();
    const cone = new THREE.Mesh(cGeo, flatMat(pick(foliagePalette)));
    cone.position.y = trunkH + i * h * 0.52 - h * 0.15;
    cone.rotation.y = rand(0, Math.PI * 2);
    cone.castShadow = true;
    group.add(cone);
  }
  group.position.set(x, 0, z);
  group.rotation.y = rand(0, Math.PI * 2);
  scene.add(group);
}

// ─── PLACE TREES: mix pine + bare ─────────────────────────────────────────────
for (let z = 5; z > -155; z -= rand(1.5, 3.2)) {
  const s = rand(0.7, 1.35);
  const makeFn = (x, z2, sc) => Math.random() > 0.38
    ? createPineTree(x, z2, sc)
    : createBareTree(x, z2, sc);

  makeFn(-(rand(2.2, 3.8)), z, s);
  makeFn(  rand(2.2, 3.8),  z, s);
  if (Math.random() > 0.40) makeFn(-(rand(4, 9)),   z + rand(-1, 1), rand(0.9, 1.5));
  if (Math.random() > 0.40) makeFn(  rand(4, 9),   z + rand(-1, 1), rand(0.9, 1.5));
  if (Math.random() > 0.62) makeFn(-(rand(9, 20)), z + rand(-2, 2), rand(1.4, 2.4));
  if (Math.random() > 0.62) makeFn(  rand(9, 20), z + rand(-2, 2), rand(1.4, 2.4));
}

// ─── GROUND SCATTER — small faceted stones ────────────────────────────────────
for (let i = 0; i < 130; i++) {
  const x = rand(-38, 38), z = -rand(2, 135);
  if (Math.abs(x) < 2.0) continue;
  const s   = rand(0.04, 0.22);
  const geo = new THREE.IcosahedronGeometry(s, 0);
  const rp  = geo.attributes.position;
  for (let j = 0; j < rp.count; j++) rp.setY(j, rp.getY(j) * rand(0.35, 0.85));
  rp.needsUpdate = true; geo.computeVertexNormals();
  const m = new THREE.Mesh(geo, flatMat(pick([P.rockDark, P.rockMid])));
  m.position.set(x, s * 0.44, z);
  m.rotation.set(rand(0, Math.PI), rand(0, Math.PI), rand(0, Math.PI));
  scene.add(m);
}

// ─── FIREFLIES ────────────────────────────────────────────────────────────────
const FF    = 220;
const ffBuf = new Float32Array(FF * 3);
const ffInf = [];
for (let i = 0; i < FF; i++) {
  const x = rand(-25, 25), y = rand(0.3, 5), z = -rand(2, 125);
  ffBuf[i*3] = x; ffBuf[i*3+1] = y; ffBuf[i*3+2] = z;
  ffInf.push({ ox: x, oy: y, phase: rand(0, Math.PI * 2), speed: rand(0.28, 0.95) });
}
const ffGeo = new THREE.BufferGeometry();
ffGeo.setAttribute('position', new THREE.BufferAttribute(ffBuf, 3));
const ffMat = new THREE.PointsMaterial({
  color: P.cyan, size: 0.065, transparent: true, opacity: 0.9,
  sizeAttenuation: true, depthWrite: false,
  blending: THREE.AdditiveBlending,
});
const fireflies = new THREE.Points(ffGeo, ffMat);
scene.add(fireflies);

// ─── MIST ─────────────────────────────────────────────────────────────────────
const mistData = [];
for (let z = -4; z > -135; z -= rand(4.5, 10)) {
  const geo = new THREE.PlaneGeometry(rand(14, 35), rand(0.8, 2.2), 3, 2);
  const mat = new THREE.MeshBasicMaterial({
    color: 0x00122a, transparent: true,
    opacity: rand(0.06, 0.16), side: THREE.DoubleSide, depthWrite: false,
  });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(rand(-5, 5), rand(0.2, 1.3), z);
  m.rotation.y = rand(-0.35, 0.35);
  scene.add(m);
  mistData.push({ m, drift: rand(0.0003, 0.0016) });
}

// ─── PATH SHIMMER TRAIL ───────────────────────────────────────────────────────
const TRAIL  = 90;
const tBuf   = new Float32Array(TRAIL * 3);
for (let i = 0; i < TRAIL; i++) {
  tBuf[i*3] = rand(-0.55, 0.55); tBuf[i*3+1] = 0.018; tBuf[i*3+2] = -(i * 1.6 + 1);
}
const tGeo = new THREE.BufferGeometry();
tGeo.setAttribute('position', new THREE.BufferAttribute(tBuf, 3));
scene.add(new THREE.Points(tGeo, new THREE.PointsMaterial({
  color: P.cyan, size: 0.042, transparent: true, opacity: 0.3,
  sizeAttenuation: true, depthWrite: false, blending: THREE.AdditiveBlending,
})));

// ─── ANIMATE ──────────────────────────────────────────────────────────────────
let t = 0, camZ = 5;
const LOOP_START = 5, LOOP_END = -115;

function animate() {
  requestAnimationFrame(animate);
  t += 0.008;

  // Camera drift
  camZ -= 0.01;
  if (camZ < LOOP_END) camZ = LOOP_START;
  camera.position.z = camZ;
  camera.position.x = Math.sin(t * 0.22) * 0.16;
  camera.position.y = 1.8 + Math.sin(t * 0.38) * 0.045;
  camera.lookAt(Math.sin(t * 0.18) * 0.28, 1.55, camZ - 20);

  // Fireflies
  const ffPos = fireflies.geometry.attributes.position;
  for (let i = 0; i < FF; i++) {
    const d = ffInf[i];
    ffPos.setX(i, d.ox + Math.sin(t * d.speed + d.phase) * 0.55);
    ffPos.setY(i, d.oy + Math.sin(t * d.speed * 0.9 + d.phase + 1.4) * 0.3);
  }
  ffPos.needsUpdate = true;
  ffMat.opacity = 0.4 + Math.abs(Math.sin(t * 2.5)) * 0.55;

  // Rock glow + path lights
  glowLights.forEach(({ l, phase, isRock }) => {
    l.intensity = isRock
      ? 0.55 + Math.sin(t * 0.65 + phase) * 0.4
      : 0.15 + Math.sin(t * 0.45 + phase) * 0.1;
  });

  // Rock glow sprites flicker
  rockSprites.forEach(({ mat, phase }) => {
    mat.opacity = Math.max(0.1, 0.55 + Math.sin(t * 0.8 + phase) * 0.3);
  });

  // Moon breathe
  moonHaloMat.opacity  = 0.45 + Math.sin(t * 0.35) * 0.1;
  moonInnerMat.opacity = 0.7  + Math.sin(t * 0.35 + 0.8) * 0.12;

  // Aurora shimmer
  auroraData.forEach(({ m, mat, phase, speed }) => {
    mat.opacity = Math.max(0.006, 0.028 + Math.sin(t * speed + phase) * 0.016);
    m.position.x += Math.sin(t * speed * 0.25 + phase) * 0.0015;
  });

  // God ray flicker
  godRayData.forEach(({ mat, phase }) => {
    mat.opacity = Math.max(0.02, 0.07 + Math.sin(t * 0.4 + phase) * 0.04);
  });

  // Mist drift
  mistData.forEach(({ m, drift }) => {
    m.position.x += drift;
    if (m.position.x > 20) m.position.x = -20;
  });

  renderer.render(scene, camera);
}
animate();

// ─── RESIZE ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
