// RENDERER
// ═══════════════════════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════════════════════
// SCENE
// ═══════════════════════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════════════════════
// CAMERA + SPRING PHYSICS
// ═══════════════════════════════════════════════════════════════════════════════
const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 300);
camera.position.set(0, 1.8, 5);

// ═══════════════════════════════════════════════════════════════════════════════
// OVERLAY CANVAS — optimised wand-tip cursor + particle trail
// ═══════════════════════════════════════════════════════════════════════════════
const overlay = document.getElementById('overlay');
overlay.width  = window.innerWidth;
overlay.height = window.innerHeight;
const octx = overlay.getContext('2d');

// ── Pre-render glow stamps ONCE ───────────────────────────────────────────────
// Patronus-inspired palette: pure white core → silver → icy blue cloud
function makeStamp(r, g, b, sz, stops) {
  const c = document.createElement('canvas');
  c.width = c.height = sz;
  const ctx2 = c.getContext('2d');
  const half = sz / 2;
  const gr = ctx2.createRadialGradient(half, half, 0, half, half, half);
  const s = stops || [[0, 1.0], [0.15, 0.60], [0.45, 0.15], [1, 0]];
  s.forEach(([t, a]) => gr.addColorStop(t, `rgba(${r},${g},${b},${a})`));
  ctx2.fillStyle = gr;
  ctx2.fillRect(0, 0, sz, sz);
  return c;
}
const SZ         = 96;
// Three tiers: blazing core, silver mid, icy-blue outer drift
const stampCore  = makeStamp(252, 255, 255, SZ, [[0,1.0],[0.12,0.70],[0.40,0.18],[1,0]]);
const stampSilv  = makeStamp(210, 230, 255, SZ, [[0,0.90],[0.20,0.45],[0.55,0.10],[1,0]]);
const stampIce   = makeStamp(155, 200, 255, SZ, [[0,0.70],[0.25,0.28],[0.60,0.06],[1,0]]);

// Mouse state
let msX = window.innerWidth * 0.5, msY = window.innerHeight * 0.5;
let msVX = 0, msVY = 0, msSpeed = 0;
let msActive = false;

// Position history
const posHistory = [];
const MAX_HIST   = 40;

// Particle pool — hard cap
const trailParts = [];
const MAX_PARTS  = 160;

let lastSpawn = 0;

// Curl-noise helper — layered sines give organic swirl without a lookup table
function curlX(x, y, t) {
  return Math.sin(y * 0.0055 + t * 0.70) * 0.55
       + Math.sin(x * 0.0038 + y * 0.0030 + t * 0.40) * 0.28;
}
function curlY(x, y, t) {
  return Math.cos(x * 0.0048 + t * 0.65) * 0.55
       + Math.cos(y * 0.0035 + x * 0.0025 + t * 0.38) * 0.28;
}

document.addEventListener('mousemove', e => {
  msVX    = e.clientX - msX;
  msVY    = e.clientY - msY;
  msSpeed = Math.sqrt(msVX * msVX + msVY * msVY);
  msX = e.clientX; msY = e.clientY;
  msActive = true;

  posHistory.push({ x: msX, y: msY });
  if (posHistory.length > MAX_HIST) posHistory.shift();

  const now = performance.now();
  if (now - lastSpawn < 14) return;
  lastSpawn = now;

  if (trailParts.length >= MAX_PARTS) return;

  const speedT = Math.min(msSpeed / 28, 1);
  // Dense cluster at tip — many small spawns, tight radius
  const burst  = Math.min(4 + Math.floor(speedT * 7), 10);

  for (let i = 0; i < burst; i++) {
    if (trailParts.length >= MAX_PARTS) break;

    // Tight spawn cloud around cursor (not velocity-sprayed)
    const r   = Math.random() * 7;
    const ang = Math.random() * Math.PI * 2;

    // Gentle outward nudge + tiny random velocity — curl does the heavy steering
    const spd = 0.15 + Math.random() * 0.55 + speedT * 0.30;
    const vAng = ang + (Math.random() - 0.5) * 2.2;

    // Assign tier: ~55% core-white, ~30% silver, ~15% icy-blue
    const rnd = Math.random();
    const tier = rnd < 0.55 ? 0 : rnd < 0.85 ? 1 : 2;

    trailParts.push({
      x:    msX + Math.cos(ang) * r,
      y:    msY + Math.sin(ang) * r,
      life: 0.70 + Math.random() * 0.45,
      maxL: 1.0,
      size: 0.7 + Math.random() * 2.8 + speedT * 1.2,
      vx:   Math.cos(vAng) * spd,
      vy:   Math.sin(vAng) * spd - 0.12,
      tier,
    });
  }
});

let idleTimer  = 0;
let trailAnimT = 0;

function drawTrail(dt2) {
  trailAnimT += dt2;

  octx.clearRect(0, 0, overlay.width, overlay.height);
  octx.globalCompositeOperation = 'lighter';
  octx.lineCap  = 'round';
  octx.lineJoin = 'round';

  // ── 1. Trail spine — pure-white Bézier, whisper thin ─────────────────────
  if (posHistory.length > 3) {
    const first = posHistory[0], last = posHistory[posHistory.length - 1];
    const g = octx.createLinearGradient(first.x, first.y, last.x, last.y);
    g.addColorStop(0,    'rgba(220,235,255,0.00)');
    g.addColorStop(0.40, 'rgba(235,245,255,0.08)');
    g.addColorStop(1,    'rgba(252,255,255,0.22)');
    octx.beginPath();
    octx.moveTo(posHistory[0].x, posHistory[0].y);
    for (let i = 1; i < posHistory.length - 1; i++) {
      const mx = (posHistory[i].x + posHistory[i + 1].x) * 0.5;
      const my = (posHistory[i].y + posHistory[i + 1].y) * 0.5;
      octx.quadraticCurveTo(posHistory[i].x, posHistory[i].y, mx, my);
    }
    octx.strokeStyle = g;
    octx.lineWidth   = 0.8;
    octx.stroke();
  }

  // ── 2. Particles — curl-noise steered, three-tier colour ─────────────────
  const fade = 0.022 + dt2 * 0.22;
  for (let i = trailParts.length - 1; i >= 0; i--) {
    const p = trailParts[i];
    p.life -= fade;
    if (p.life <= 0 || p.size < 0.18) { trailParts.splice(i, 1); continue; }

    // Apply curl noise — organic swirl that evolves over time
    p.vx += curlX(p.x, p.y, trailAnimT) * 0.045;
    p.vy += curlY(p.x, p.y, trailAnimT) * 0.045;

    // Gentle drag + very slight upward float
    p.vx *= 0.955;
    p.vy  = p.vy * 0.955 - 0.008;
    p.x  += p.vx;
    p.y  += p.vy;
    p.size *= 0.978;

    // Life-cycle opacity: ramp up quickly, then decay — feels like ignition
    const lifeN = p.life / (p.maxL || 1.0);
    const alpha = lifeN < 0.15
      ? lifeN / 0.15                      // ignition ramp
      : Math.min(lifeN * 0.72, 0.58);     // gentle decay, capped soft

    const stamp = p.tier === 0 ? stampCore : p.tier === 1 ? stampSilv : stampIce;
    const drawW = p.size * (p.tier === 0 ? 3.0 : p.tier === 1 ? 4.2 : 5.5);
    octx.globalAlpha = alpha;
    octx.drawImage(stamp, p.x - drawW * 0.5, p.y - drawW * 0.5, drawW, drawW);
  }
  octx.globalAlpha = 1;

  // ── 3. Idle breath — whisper motes orbit the cursor tip ──────────────────
  idleTimer += dt2;
  if (idleTimer > 0.18 && msActive && trailParts.length < MAX_PARTS) {
    idleTimer = 0;
    const ang = trailAnimT * 1.8 + Math.random() * 0.8;
    const d   = 4 + Math.random() * 12;
    const rnd = Math.random();
    trailParts.push({
      x: msX + Math.cos(ang) * d, y: msY + Math.sin(ang) * d,
      life: 0.40 + Math.random() * 0.25, maxL: 0.65,
      size: 0.5 + Math.random() * 1.8,
      vx: Math.cos(ang) * 0.12, vy: Math.sin(ang) * 0.12 - 0.18,
      tier: rnd < 0.5 ? 0 : rnd < 0.80 ? 1 : 2,
    });
  }

  // ── 4. Cursor — pure wand-tip light, zero chrome ─────────────────────────
  if (!msActive) { octx.globalCompositeOperation = 'source-over'; return; }

  // Outer silver glow — very soft, wide, low opacity
  const outerW = 72;
  octx.globalAlpha = 0.14;
  octx.drawImage(stampIce, msX - outerW * 0.5, msY - outerW * 0.5, outerW, outerW);

  // Mid silver bloom
  const midW = 34;
  octx.globalAlpha = 0.28;
  octx.drawImage(stampSilv, msX - midW * 0.5, msY - midW * 0.5, midW, midW);

  // Bright core burst — the wand tip itself
  const coreW = 16;
  octx.globalAlpha = 0.80;
  octx.drawImage(stampCore, msX - coreW * 0.5, msY - coreW * 0.5, coreW, coreW);
  octx.globalAlpha = 1;

  // Pinpoint white dot — gives precise aim without any geometric chrome
  octx.fillStyle = 'rgba(255,255,255,0.95)';
  octx.beginPath(); octx.arc(msX, msY, 1.4, 0, Math.PI * 2); octx.fill();

  octx.globalCompositeOperation = 'source-over';
}

// Spring state: position + velocity per axis
const sp = { px:0, py:1.8, pz:5, vx:0, vy:0, vz:0 };
const lk = { px:0, py:1.55, vx:0, vy:0 };

// Semi-implicit spring integrator (critically-damped feel)
function springStep(p, v, target, dt, freq, damp) {
  const w = 2 * Math.PI * freq;
  const a = -(w * w) * (p - target) - 2 * damp * w * v;
  const nv = v + a * dt;
  const np = p + nv * dt;
  return { p: np, v: nv };
}

// Mouse parallax (smooth, lazy)
const mouse = { x: 0, y: 0, tx: 0, ty: 0 };
document.addEventListener('mousemove', e => {
  mouse.tx = (e.clientX / window.innerWidth  - 0.5) * 2;
  mouse.ty = (e.clientY / window.innerHeight - 0.5) * 2;
});

// ═══════════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
const rand  = (a, b)  => a + Math.random() * (b - a);
const pick  = arr     => arr[Math.floor(Math.random() * arr.length)];
const lerp  = (a,b,t) => a + (b - a) * t;
const flatMat = c     => new THREE.MeshPhongMaterial({ color: c, flatShading: true });

// ═══════════════════════════════════════════════════════════════════════════════
// PALETTE
// ═══════════════════════════════════════════════════════════════════════════════
const P = {
  groundDark:  0x02060c, groundMid: 0x040b14, groundLight: 0x071018,
  trunkA: 0x06090e, trunkB: 0x090d12,
  foliageA: 0x040810, foliageB: 0x050a12, foliageC: 0x03060d, foliageD: 0x040912,
  pathA:   0x06101a,
  rockDark: 0x080f18, rockMid: 0x0c1520,
  silver: 0x8899cc,    // primary magical silver
  silverDim: 0x445577, // dimmer silver
  flowerA: 0x1a1f28, flowerB: 0x1e2430, flowerC: 0x151c26, flowerD: 0x222838,
  star: 0x778899, starDim: 0x223344,
  stone: 0x0c1522, stoneDark: 0x060c14,
  mushA: 0x0e1520, mushB: 0x0a1018, mushC: 0x111821,
  logA: 0x060a0e, logB: 0x08101a,
};

// ═══════════════════════════════════════════════════════════════════════════════
// PROCEDURAL CANVAS TEXTURES
// ═══════════════════════════════════════════════════════════════════════════════

// Ground texture — scattered pebble noise
function makeGroundTex() {
  const c = document.createElement('canvas'); c.width = c.height = 512;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#071626'; ctx.fillRect(0,0,512,512);
  for (let i = 0; i < 1800; i++) {
    const x = Math.random()*512, y = Math.random()*512;
    const rx = 1+Math.random()*4, ry = 0.5+Math.random()*2;
    const b = Math.floor(Math.random()*18+4);
    ctx.fillStyle = `rgb(${Math.floor(b*0.4)},${Math.floor(b*0.55)},${b})`;
    ctx.beginPath();
    ctx.ellipse(x,y,rx,ry,Math.random()*Math.PI,0,Math.PI*2);
    ctx.fill();
  }
  // Subtle path-width lighter centre
  const g = ctx.createLinearGradient(200,0,312,0);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(0.5,'rgba(20,40,60,0.2)'); g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,512,512);
  return new THREE.CanvasTexture(c);
}

// Path texture — fine soil grain
function makePathTex() {
  const c = document.createElement('canvas'); c.width = 256; c.height = 512;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#0b1c2c'; ctx.fillRect(0,0,256,512);
  for (let i = 0; i < 2200; i++) {
    const x = Math.random()*256, y = Math.random()*512;
    const r = 0.4+Math.random()*1.2;
    const b = Math.floor(Math.random()*14+3);
    ctx.fillStyle = `rgba(${Math.floor(b*0.3)},${Math.floor(b*0.5)},${b},0.7)`;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }
  return new THREE.CanvasTexture(c);
}

// Bark texture — vertical striations
function makeBarkTex() {
  const c = document.createElement('canvas'); c.width = 128; c.height = 256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#0c1822'; ctx.fillRect(0,0,128,256);
  for (let i = 0; i < 55; i++) {
    const x = Math.random()*128, w = 0.5+Math.random()*2.5;
    const b = Math.floor(Math.random()*14+4);
    ctx.strokeStyle = `rgb(${Math.floor(b*0.35)},${Math.floor(b*0.55)},${b})`;
    ctx.lineWidth = w; ctx.beginPath(); ctx.moveTo(x,0);
    for (let y=0; y<256; y+=6) ctx.lineTo(x+(Math.random()-0.5)*3, y);
    ctx.stroke();
  }
  return new THREE.CanvasTexture(c);
}

// Moon surface
function makeMoonTex() {
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0,'#e8f4ff'); g.addColorStop(0.6,'#c4dcff'); g.addColorStop(1,'rgba(180,210,255,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,128,128);
  // subtle craters
  for (let i = 0; i < 12; i++) {
    const cx2 = 20+Math.random()*88, cy = 20+Math.random()*88, r = 2+Math.random()*8;
    ctx.strokeStyle = 'rgba(100,140,200,0.3)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(cx2,cy,r,0,Math.PI*2); ctx.stroke();
  }
  return new THREE.CanvasTexture(c);
}

const groundTex = makeGroundTex();
const pathTex   = makePathTex();
const barkTex   = makeBarkTex();
const moonTex   = makeMoonTex();
[groundTex,pathTex,barkTex].forEach(t => { t.wrapS = t.wrapT = THREE.RepeatWrapping; });
groundTex.repeat.set(10,22); pathTex.repeat.set(2,30); barkTex.repeat.set(1,3);

// ═══════════════════════════════════════════════════════════════════════════════
// GLOW SPRITES
// ═══════════════════════════════════════════════════════════════════════════════
function makeGlowTex(r,g,b) {
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const ctx = c.getContext('2d');
  const gr = ctx.createRadialGradient(64,64,0,64,64,64);
  gr.addColorStop(0,   `rgba(${r},${g},${b},1.0)`);
  gr.addColorStop(0.2, `rgba(${r},${g},${b},0.7)`);
  gr.addColorStop(0.5, `rgba(${r},${g},${b},0.2)`);
  gr.addColorStop(0.8, `rgba(${r},${g},${b},0.05)`);
  gr.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = gr; ctx.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}
const glowSilver = makeGlowTex(180, 210, 255);  // primary silver glow
const glowIce    = makeGlowTex(130, 170, 240);  // cooler ice-blue glow
const glowMoon   = makeGlowTex(210, 228, 255);  // moonlight halo
const glowWhite  = makeGlowTex(240, 248, 255);  // bright white core

function makeSprite(tex, size, opacity=0.7) {
  const mat = new THREE.SpriteMaterial({
    map:tex, blending:THREE.AdditiveBlending,
    transparent:true, opacity, depthWrite:false,
  });
  const s = new THREE.Sprite(mat);
  s.scale.set(size,size,1);
  return { sprite:s, mat };
}

// ═══════════════════════════════════════════════════════════════════════════════
// MOUNTAIN SILHOUETTES (depth layers, barely visible through fog)
// ═══════════════════════════════════════════════════════════════════════════════
function makeMountainLayer(z, col) {
  const shape = new THREE.Shape();
  const W = 260;
  shape.moveTo(-W/2, -2);
  let cx = -W/2;
  while (cx < W/2) {
    const pw = rand(15,45), ph = rand(4,22);
    shape.lineTo(cx+pw*0.45, ph);
    cx += pw;
    shape.lineTo(Math.min(cx, W/2), rand(1,6));
  }
  shape.lineTo(W/2,-2); shape.closePath();
  const m = new THREE.Mesh(new THREE.ShapeGeometry(shape),
    new THREE.MeshBasicMaterial({ color:col, side:THREE.DoubleSide }));
  m.position.set(0, 4, z);
  scene.add(m);
}
makeMountainLayer(-200, 0x00040e);
makeMountainLayer(-168, 0x00060f);
makeMountainLayer(-142, 0x00090e);

// ═══════════════════════════════════════════════════════════════════════════════
// AURORA — 12 ribbons, richer colours
// ═══════════════════════════════════════════════════════════════════════════════
// Silver mist veils — replace rainbow aurora with ghostly silver-white haze
const auroraData = [];
// Patronus palette: near-white silver to ice-blue, monochromatic
const veilCols = [0xaabbdd, 0x8899cc, 0x99aacc, 0x6677aa, 0xbbccee, 0x7788bb, 0x99aabb];
for (let i = 0; i < 7; i++) {
  const w = rand(120,280), h = rand(14,32);
  const geo = new THREE.PlaneGeometry(w, h, 5, 2);
  const pos = geo.attributes.position;
  for (let j = 0; j < pos.count; j++) {
    pos.setY(j, pos.getY(j) + (Math.random()-0.5)*8);
    pos.setX(j, pos.getX(j) + (Math.random()-0.5)*12);
  }
  pos.needsUpdate = true; geo.computeVertexNormals();
  const mat = new THREE.MeshBasicMaterial({

function addMushroom(x, z2) {
  const grp = new THREE.Group();
  const h = rand(0.15,0.5);

  // Stem
  const sGeo = new THREE.CylinderGeometry(rand(0.03,0.07)*h/0.3, rand(0.05,0.10)*h/0.3, h, 6, 2);
  grp.add(new THREE.Mesh(sGeo, new THREE.MeshPhongMaterial({
    color:0x1c2e3e, emissive:0x000a14, flatShading:true,
  })));

  // Cap — icosahedron squashed into a dome
  const capR = rand(0.10,0.24);
  const capGeo = new THREE.IcosahedronGeometry(capR, 1);
  const cp = capGeo.attributes.position;
  for (let i=0;i<cp.count;i++) {
    const y = cp.getY(i);
    cp.setY(i, y < 0 ? y*0.15 : y*0.65);  // squash into dome
  }
  cp.needsUpdate = true; capGeo.computeVertexNormals();
  const cap = new THREE.Mesh(capGeo, new THREE.MeshPhongMaterial({
    color: pick([P.mushA,P.mushB,P.mushC]), emissive:0x110033, flatShading:true,
  }));
  cap.position.y = h + capR*0.1;
  grp.add(cap);

  // Inner stem mesh at origin
  grp.children[0].position.y = h/2;

  // Soft glow — barely visible silver breath
  const { sprite:ms } = makeSprite(glowIce, rand(0.5,1.2), rand(0.08,0.20));
  ms.position.set(0, h+capR*0.5, 0); grp.add(ms);

  grp.position.set(x, 0, z2);
  grp.rotation.y = rand(0,Math.PI*2);
  grp.scale.setScalar(rand(0.8,1.3));
  scene.add(grp);
}

// TREES — bare & pine with bark texture on trunks
// ═══════════════════════════════════════════════════════════════════════════════
const up3 = new THREE.Vector3(0,1,0);
const foliagePalette = [P.foliageA, P.foliageB, P.foliageC, P.foliageD];
const trunkMat = () => new THREE.MeshPhongMaterial({
  map: barkTex, color: pick([P.trunkA,P.trunkB]),
});

function createBareTree(x, z2, scale) {
  const grp = new THREE.Group();
  const trunkH = rand(4.5,8.5)*scale;
  const tGeo = new THREE.CylinderGeometry(0.045*scale, 0.16*scale, trunkH, 7, 3);
  const tp = tGeo.attributes.position;
  for (let i=0;i<tp.count;i++) tp.setX(i, tp.getX(i)+(Math.random()-0.5)*0.06*scale);
  tp.needsUpdate = true; tGeo.computeVertexNormals();
  const trunk = new THREE.Mesh(tGeo, trunkMat());
  trunk.position.y = trunkH/2; trunk.castShadow = true; grp.add(trunk);

  const bCount = 3+Math.floor(Math.random()*5);
  for (let i=0;i<bCount;i++) {
    const bLen = rand(0.8,2.6)*scale;
    const outAng = rand(0.4,1.0), dirY = rand(0,Math.PI*2);
    const dir = new THREE.Vector3(
      Math.sin(outAng)*Math.sin(dirY), Math.cos(outAng), Math.sin(outAng)*Math.cos(dirY)
    ).normalize();
    const bGeo = new THREE.CylinderGeometry(0.009*scale, 0.042*scale, bLen, 4, 1);
    const branch = new THREE.Mesh(bGeo, flatMat(pick([P.trunkA,P.trunkB])));
    branch.quaternion.copy(new THREE.Quaternion().setFromUnitVectors(up3,dir));
    const h = rand(0.32,0.90)*trunkH;
    branch.position.set(dir.x*bLen/2, h+dir.y*bLen/2, dir.z*bLen/2);
    branch.castShadow = true; grp.add(branch);

    if (Math.random()>0.48) {
      const sbLen=bLen*rand(0.3,0.56), sbOut=rand(0.4,0.9), sbDirY=rand(0,Math.PI*2);
      const sbDir = new THREE.Vector3(Math.sin(sbOut)*Math.sin(sbDirY), Math.cos(sbOut), Math.sin(sbOut)*Math.cos(sbDirY)).normalize();
      const sb = new THREE.Mesh(new THREE.CylinderGeometry(0.004*scale,0.019*scale,sbLen,4,1), flatMat(P.trunkA));
      sb.quaternion.copy(new THREE.Quaternion().setFromUnitVectors(up3,sbDir));
      sb.position.set(dir.x*bLen/2+sbDir.x*sbLen/2, h+dir.y*bLen/2+sbDir.y*sbLen/2, dir.z*bLen/2+sbDir.z*sbLen/2);
      grp.add(sb);
    }
  }
  grp.position.set(x,0,z2); grp.rotation.y = rand(0,Math.PI*2); scene.add(grp);
}

function createPineTree(x, z2, scale) {
  const grp = new THREE.Group();
  const trunkH = rand(3.0,5.2)*scale;
  const tGeo = new THREE.CylinderGeometry(0.065*scale, 0.23*scale, trunkH, 6, 3);
  const tp = tGeo.attributes.position;
  for (let i=0;i<tp.count;i++) tp.setX(i, tp.getX(i)+(Math.random()-0.5)*0.07*scale);
  tp.needsUpdate = true; tGeo.computeVertexNormals();
  const trunk = new THREE.Mesh(tGeo, trunkMat());
  trunk.position.y = trunkH/2; trunk.castShadow = true; grp.add(trunk);

  const layers = 3+Math.floor(Math.random()*4);
  for (let i=0;i<layers;i++) {
    const t2 = i/(layers-1||1);
    const r = (0.85-t2*0.32)*scale, h2 = (1.80-t2*0.22)*scale;
    const cGeo = new THREE.ConeGeometry(r, h2, 5+Math.floor(Math.random()*2), 1);
    const cp2 = cGeo.attributes.position;
    for (let j=0;j<cp2.count;j++) {
      cp2.setX(j, cp2.getX(j)+(Math.random()-0.5)*0.09*scale);
      cp2.setZ(j, cp2.getZ(j)+(Math.random()-0.5)*0.09*scale);
    }
    cp2.needsUpdate = true; cGeo.computeVertexNormals();
    const cone = new THREE.Mesh(cGeo, flatMat(pick(foliagePalette)));
    cone.position.y = trunkH + i*h2*0.52 - h2*0.15;
    cone.rotation.y = rand(0,Math.PI*2); cone.castShadow = true; grp.add(cone);
  }
  grp.position.set(x,0,z2); grp.rotation.y = rand(0,Math.PI*2); scene.add(grp);
}

  const geo = new THREE.IcosahedronGeometry(s,0);
  const rp = geo.attributes.position;
  for (let j=0;j<rp.count;j++) rp.setY(j, rp.getY(j)*rand(0.3,0.8));
  rp.needsUpdate = true; geo.computeVertexNormals();
  const m = new THREE.Mesh(geo, flatMat(pick([P.rockDark,P.rockMid])));
  m.position.set(x, s*0.44, z2);
  m.rotation.set(rand(0,Math.PI),rand(0,Math.PI),rand(0,Math.PI));
  scene.add(m);
}

// ═══════════════════════════════════════════════════════════════════════════════
// PATRONUS ENERGY FIELD — dense silver cloud filling the forest air
// ═══════════════════════════════════════════════════════════════════════════════
const ENERGY = 600, eBuf = new Float32Array(ENERGY*3), eInf = [];
for (let i = 0; i < ENERGY; i++) {
  const x = rand(-40, 40), y = rand(0.1, 12), z2 = -rand(1, 150);
  eBuf[i*3] = x; eBuf[i*3+1] = y; eBuf[i*3+2] = z2;
  eInf.push({ ox:x, oy:y, ph:rand(0,Math.PI*2), phY:rand(0,Math.PI*2),
    sp:rand(0.02,0.10), amp:rand(0.1,0.5), ampY:rand(0.05,0.22) });
}
const eGeo = new THREE.BufferGeometry();
eGeo.setAttribute('position', new THREE.BufferAttribute(eBuf, 3));
const eMat = new THREE.PointsMaterial({
  color:0x6677aa, size:0.018, transparent:true, opacity:0.55,
  sizeAttenuation:true, depthWrite:false, blending:THREE.AdditiveBlending,
});
const energyField = new THREE.Points(eGeo, eMat);
scene.add(energyField);

// ═══════════════════════════════════════════════════════════════════════════════
// FIREFLIES — silver motes
// ═══════════════════════════════════════════════════════════════════════════════
// Silver motes — float like Patronus energy, very slow and ethereal
const FF = 180, ffBuf = new Float32Array(FF*3), ffInf = [];
for (let i=0;i<FF;i++) {
  const x=rand(-28,28), y=rand(0.2,6.5), z2=-rand(1,130);
  ffBuf[i*3]=x; ffBuf[i*3+1]=y; ffBuf[i*3+2]=z2;
  ffInf.push({ ox:x, oy:y, ph:rand(0,Math.PI*2), phY:rand(0,Math.PI*2), sp:rand(0.06,0.28), amp:rand(0.2,0.7), ampY:rand(0.10,0.35) });
}
const ffGeo = new THREE.BufferGeometry();
ffGeo.setAttribute('position', new THREE.BufferAttribute(ffBuf,3));
const ffMat = new THREE.PointsMaterial({
  color:0xaabbdd, size:0.060, transparent:true, opacity:0.75,
  sizeAttenuation:true, depthWrite:false, blending:THREE.AdditiveBlending,
});
const fireflies = new THREE.Points(ffGeo, ffMat);
scene.add(fireflies);

// Brighter silver sparks — smaller, closer, like lingering patronus fragments
const FFP=80, ffBufP=new Float32Array(FFP*3), ffInfP=[];
for (let i=0;i<FFP;i++) {
  const x=rand(-18,18), y=rand(0.3,3.8), z2=-rand(2,100);
  ffBufP[i*3]=x; ffBufP[i*3+1]=y; ffBufP[i*3+2]=z2;
  ffInfP.push({ ox:x, oy:y, ph:rand(0,Math.PI*2), phY:rand(0,Math.PI*2), sp:rand(0.08,0.35), amp:rand(0.15,0.55), ampY:rand(0.08,0.28) });
}
const ffGeoP = new THREE.BufferGeometry();
ffGeoP.setAttribute('position', new THREE.BufferAttribute(ffBufP,3));
const ffMatP = new THREE.PointsMaterial({
  color:0xdde8ff, size:0.045, transparent:true, opacity:0.65,
  sizeAttenuation:true, depthWrite:false, blending:THREE.AdditiveBlending,
});
const firefliesP = new THREE.Points(ffGeoP, ffMatP);
scene.add(firefliesP);

// ═══════════════════════════════════════════════════════════════════════════════
// MIST
// ═══════════════════════════════════════════════════════════════════════════════
// Ground mist — thick, silver-white, like the Forbidden Forest
const mistData = [];
for (let z2=-2; z2>-148; z2-=rand(2.5,6)) {
  // Low ground tendrils
  const mat = new THREE.MeshBasicMaterial({
    color:0x2a3a55, transparent:true, opacity:rand(0.12,0.28),
    side:THREE.DoubleSide, depthWrite:false,
  });
  const m = new THREE.Mesh(new THREE.PlaneGeometry(rand(22,55),rand(0.6,1.8),4,2), mat);
  m.position.set(rand(-7,7), rand(0.05,0.55), z2);
  m.rotation.y = rand(-0.5,0.5);
  scene.add(m);
  mistData.push({ m, drift:rand(0.0002,0.0015) });
}
// Mid-air silver haze bands
for (let z2=-8; z2>-145; z2-=rand(10,20)) {
  const mat = new THREE.MeshBasicMaterial({
    color:0x1a2840, transparent:true, opacity:rand(0.06,0.14),
    side:THREE.DoubleSide, depthWrite:false,
  });
  const m = new THREE.Mesh(new THREE.PlaneGeometry(rand(35,80),rand(2.0,5.0),4,2), mat);
  m.position.set(rand(-5,5), rand(1.0,3.5), z2);
  m.rotation.y = rand(-0.3,0.3);
  scene.add(m);
  mistData.push({ m, drift:rand(-0.0008,0.0008) });
}

// ═══════════════════════════════════════════════════════════════════════════════
// PATH SHIMMER + DUST MOTES
// ═══════════════════════════════════════════════════════════════════════════════
// Path shimmer — silver moonlight reflected off wet cobblestones
const TRAIL=110, tBuf=new Float32Array(TRAIL*3);
for (let i=0;i<TRAIL;i++) {
  tBuf[i*3]=rand(-0.60,0.60); tBuf[i*3+1]=0.02; tBuf[i*3+2]=-(i*1.7+1);
}
const tGeo = new THREE.BufferGeometry();
tGeo.setAttribute('position', new THREE.BufferAttribute(tBuf,3));
scene.add(new THREE.Points(tGeo, new THREE.PointsMaterial({
  color:0x7788aa, size:0.040, transparent:true, opacity:0.28,
  sizeAttenuation:true, depthWrite:false, blending:THREE.AdditiveBlending,
})));

// Dust motes — silver-white, very slow
const DUST=90, dBuf=new Float32Array(DUST*3), dInf=[];
for (let i=0;i<DUST;i++) {
  const x=rand(-22,22), y=rand(0.4,5.0), z2=-rand(1,110);
  dBuf[i*3]=x; dBuf[i*3+1]=y; dBuf[i*3+2]=z2;
  dInf.push({ ox:x, oy:y, ph:rand(0,Math.PI*2), sp:rand(0.03,0.14) });
}
const dGeo = new THREE.BufferGeometry();
dGeo.setAttribute('position', new THREE.BufferAttribute(dBuf,3));
const dustMesh = new THREE.Points(dGeo, new THREE.PointsMaterial({
  color:0x8899bb, size:0.028, transparent:true, opacity:0.42,
  sizeAttenuation:true, depthWrite:false, blending:THREE.AdditiveBlending,
}));
scene.add(dustMesh);

// ═══════════════════════════════════════════════════════════════════════════════
// ANIMATE
// ═══════════════════════════════════════════════════════════════════════════════
let t = 0, camDriftZ = 5;
const LOOP_START = 5, LOOP_END = -118;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  t += dt * 0.88;

  // ── Mouse smoothing — very lazy so it never jerks ──
  mouse.x += (mouse.tx - mouse.x) * Math.min(1.0*dt, 0.06);
  mouse.y += (mouse.ty - mouse.y) * Math.min(1.0*dt, 0.06);

  // ── Camera forward drift — slow, majestic walk ──
  camDriftZ -= dt * 0.65;
  if (camDriftZ < LOOP_END) camDriftZ = LOOP_START;

  // ── Fog breathes between near-black ↔ deep navy — Forbidden Forest mood ──
  const fogPulse = Math.sin(t*0.05)*0.5+0.5;
  scene.fog.color.setRGB(0, lerp(0.010,0.018,fogPulse), lerp(0.032,0.048,fogPulse));

  // ── Target camera position (gentle sway + mouse) ──
  const tX = Math.sin(t*0.18)*0.10 + Math.sin(t*0.06)*0.04 + mouse.x*0.18;
  const tY = 1.8 + Math.sin(t*0.28)*0.030 + Math.sin(t*0.13)*0.012 - mouse.y*0.08;

  // ── Spring-physics camera — critically-damped (damp≥1 = zero overshoot) ──
  { const r=springStep(sp.px,sp.vx,tX,dt,1.6,1.05); sp.px=r.p; sp.vx=r.v; }
  { const r=springStep(sp.py,sp.vy,tY,dt,1.4,1.05); sp.py=r.p; sp.vy=r.v; }
  // Z: very slow spring so the forward drift is perfectly smooth
  { const r=springStep(sp.pz,sp.vz,camDriftZ,dt,0.55,1.10); sp.pz=r.p; sp.vz=r.v; }

  // ── Look target — reduced sway + gentle mouse offset ──
  const tlX = Math.sin(t*0.14)*0.14 + mouse.x*0.38;
  const tlY = 1.55 - mouse.y*0.10;
  { const r=springStep(lk.px,lk.vx,tlX,dt,2.0,1.05); lk.px=r.p; lk.vx=r.v; }
  { const r=springStep(lk.py,lk.vy,tlY,dt,1.8,1.05); lk.py=r.p; lk.vy=r.v; }

  camera.position.set(sp.px, sp.py, sp.pz);
  camera.lookAt(lk.px, lk.py, sp.pz - 20);

  // ── Patronus energy field — very slow drift ──
  const eP = energyField.geometry.attributes.position;
  for (let i=0;i<ENERGY;i++) {
    const d=eInf[i];
    eP.setX(i, d.ox + Math.sin(t*d.sp+d.ph)*d.amp);
    eP.setY(i, d.oy + Math.sin(t*d.sp*0.7+d.phY)*d.ampY);
  }
  eP.needsUpdate = true;
  eMat.opacity = 0.28 + Math.sin(t*0.18)*0.10;

  // ── Silver motes ──
  const ffP = fireflies.geometry.attributes.position;
  for (let i=0;i<FF;i++) {
    const d=ffInf[i];
    ffP.setX(i, d.ox + Math.sin(t*d.sp+d.ph)*d.amp);
    ffP.setY(i, d.oy + Math.sin(t*d.sp*0.83+d.phY)*d.ampY);
  }
  ffP.needsUpdate = true;
  ffMat.opacity = 0.28 + Math.sin(t*0.88)*0.18 + Math.sin(t*1.6)*0.08;

  // ── Purple fireflies ──
  const ffPP = firefliesP.geometry.attributes.position;
  for (let i=0;i<FFP;i++) {
    const d=ffInfP[i];
    ffPP.setX(i, d.ox + Math.sin(t*d.sp+d.ph)*d.amp);
    ffPP.setY(i, d.oy + Math.sin(t*d.sp*0.80+d.phY)*d.ampY);
  }
  ffPP.needsUpdate = true;
  ffMatP.opacity = 0.20 + Math.sin(t*0.72+1.6)*0.14;

  // ── Dust motes ──
  const dP = dustMesh.geometry.attributes.position;
  for (let i=0;i<DUST;i++) {
    const d=dInf[i];
    dP.setX(i, d.ox + Math.sin(t*d.sp+d.ph)*0.65);
    dP.setY(i, d.oy + Math.sin(t*d.sp*1.1+d.ph+2)*0.38);
  }
  dP.needsUpdate = true;

  // ── Rock + path lights ──
  glowLights.forEach(({ l, phase, isRock }) => {
    l.intensity = isRock
      ? 0.28 + Math.sin(t*0.42+phase)*0.16 + Math.sin(t*0.9+phase*1.1)*0.06
      : 0.14 + Math.sin(t*0.32+phase)*0.06;
  });

  // ── Rock sprites ──
  rockSprites.forEach(({ mat, phase }) => {
    mat.opacity = Math.max(0.05, 0.24 + Math.sin(t*0.55+phase)*0.12 + Math.sin(t*1.1+phase)*0.04);
  });

  // ── Moon breathe ──
  mH1Mat.opacity = 0.38 + Math.sin(t*0.28)*0.10 + Math.sin(t*0.10)*0.04;
  mH2Mat.opacity = 0.55 + Math.sin(t*0.26+0.5)*0.10;
  mH3Mat.opacity = 0.82 + Math.sin(t*0.31+0.9)*0.12;

  // ── Aurora shimmer ──
  // Silver veils — breathe very slowly like distant mist
  auroraData.forEach(({ m, mat, phase, speed }) => {
    mat.opacity = Math.max(0.003, 0.014 + Math.sin(t*speed+phase)*0.008 + Math.sin(t*speed*0.38+phase+1)*0.004);
    m.position.x += Math.sin(t*speed*0.10+phase)*0.0012;
    m.rotation.z = Math.sin(t*speed*0.08+phase)*0.008;
  });

  // ── God rays ──
  godRayData.forEach(({ mat, phase }) => {
    mat.opacity = Math.max(0.025, 0.082 + Math.sin(t*0.36+phase)*0.044 + Math.sin(t*0.84+phase)*0.022);
  });

  // ── Caustics ──
  causticData.forEach(({ mat, phase, speed }) => {
    mat.opacity = Math.max(0.01, 0.072 + Math.sin(t*speed+phase)*0.055 + Math.sin(t*speed*2.2+phase)*0.02);
  });

  // ── Puddles shimmer ──
  puddleMats.forEach(({ mat, phase }) => {
    mat.opacity = 0.62 + Math.sin(t*0.75+phase)*0.16;
  });

  // ── Mist drift ──
  mistData.forEach(({ m, drift }) => {
    m.position.x += drift * dt * 60;
    if (m.position.x > 24)  m.position.x = -24;
    if (m.position.x < -24) m.position.x =  24;
  });

  // Compute shadow map on first frame only, then freeze
  if (!renderer._shadowsFrozen) {
    renderer.shadowMap.needsUpdate = true;
    renderer._shadowsFrozen = true;
  }

  renderer.render(scene, camera);

  // ── 2D trail (drawn over the 3D canvas) ──
  drawTrail(dt);
}
animate();

// ═══════════════════════════════════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  overlay.width  = window.innerWidth;
  overlay.height = window.innerHeight;
});
</script>
</body>
</html>
